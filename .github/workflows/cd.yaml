name: Deploy [prod]

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - 'README.md'
      - 'docs/**'

env:
  PROJECT_ID: ${{ secrets.GKE_PROJECT }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER_NAME }}
  ENV_PROD: ${{ secrets.ENV_PROD }}
  GKE_ZONE: us-central1-c
  IMAGE: api-cct
  MY_ENV: production

jobs:
  lint:
    name: Dockerfiles linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hadolint
        uses: reviewdog/action-hadolint@v1
        with:
          hadolint_ignore: DL3008
          reporter: github-pr-review

  build:
    needs: [lint]
    name: Build and update deployments
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Autentica no Google Cloud de forma global (Substitui os parâmetros antigos)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      # 2. Configura a CLI do gcloud herdando a autenticação acima
      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker with gcloud
        run: |-
          gcloud --quiet auth configure-docker

      # 3. Obtém as credenciais do GKE de forma limpa
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Mount env
        run: |-
          echo "${{ secrets.ENV_PROD }}" > env-deploy
          ls -a

      - name: Build Docker image
        run: |-
          pwd
          ls -a
          docker build \
            --tag "gcr.io/$PROJECT_ID/$IMAGE:$GITHUB_SHA" \
            -f Dockerfile \
            .

      - name: Publish Docker image
        run: |-
          docker push "gcr.io/$PROJECT_ID/$IMAGE:$GITHUB_SHA"

      - name: Set up Kustomize
        run: |-
          cd ./.kubernetes/prod
          curl -sfLo kustomize https://github.com/kubernetes-sigs/kustomize/releases/download/v3.1.0/kustomize_3.1.0_linux_amd64
          chmod u+x ./kustomize

      - name: Deploy
        run: |-
          cd ./.kubernetes/prod
          ./kustomize edit set image gcr.io/PROJECT_ID/IMAGE:TAG=gcr.io/$PROJECT_ID/$IMAGE:$GITHUB_SHA
          ./kustomize build . | kubectl apply -n cct -f -
          kubectl get services -n cct -o wide
